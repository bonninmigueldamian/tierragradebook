<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TierraGradeBook</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2744;--navy2:#2d3f6b;--navy3:#3d5490;
  --gold:#c9a84c;--gold2:#e8d08a;
  --bg:#f0f2f7;--white:#fff;--text:#1a2744;--muted:#6b7280;
  --border:#dde2ee;--border2:#c8d0e2;
  --ok:#16a34a;--warn:#d97706;--err:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOADING */
.full-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.full-screen.navy{background:var(--navy)}
.full-screen.light{background:var(--bg)}
.brand-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);margin-bottom:.3rem;text-align:center}
.brand-sub{font-size:.85rem;color:rgba(255,255,255,.55);text-align:center}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:1.5rem auto 0}
.spinner.dark{border-color:var(--border);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:.75rem;text-align:center}
.hidden{display:none!important}

/* LOGIN */
.login-wrap{background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-box{background:#fff;border-radius:16px;padding:2.5rem;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3);text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--navy);margin-bottom:.2rem}
.login-tagline{font-size:.83rem;color:var(--muted);margin-bottom:2rem;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:.8rem 1.25rem;border:2px solid var(--border2);border-radius:10px;background:#fff;font-family:inherit;font-size:.92rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s}
.google-btn:hover{border-color:var(--navy);background:#f7f9ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.login-err{color:var(--err);font-size:.8rem;margin-top:.75rem;min-height:1rem}

/* MAT SELECTOR */
.mat-box{background:#fff;border-radius:14px;border:1px solid var(--border);padding:2.5rem;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.mat-logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:.25rem}
.mat-sub{font-size:.83rem;color:var(--muted);margin-bottom:1.75rem}
.mat-user{font-size:.78rem;color:var(--navy2);background:#eef2ff;padding:.28rem .75rem;border-radius:999px;display:inline-block;margin-bottom:1.25rem}
.mat-btn{display:block;width:100%;text-align:left;padding:1rem 1.25rem;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:.92rem;font-weight:600;color:var(--navy);cursor:pointer;transition:all .2s;margin-bottom:.75rem}
.mat-btn:hover{border-color:var(--gold);background:#fffdf5;transform:translateX(4px)}
.mat-btn-sub{font-size:.74rem;font-weight:400;color:var(--muted);margin-top:.2rem}

/* HEADER */
.hdr{background:var(--navy);display:flex;align-items:center;padding:0 1.25rem;height:52px;gap:.65rem;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.hdr-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold)}
.hdr-div{width:1px;height:20px;background:var(--navy2)}
.hdr-sub{font-size:.78rem;color:rgba(255,255,255,.45)}
.hdr-materia{margin-left:auto;font-size:.8rem;color:var(--gold2);font-weight:500;padding:.18rem .65rem;background:rgba(255,255,255,.07);border-radius:6px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-user{font-size:.72rem;color:rgba(255,255,255,.35);margin-left:.5rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:6px;padding:.25rem .65rem;font-family:inherit;font-size:.72rem;cursor:pointer;transition:all .18s;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.hdr-btn-danger{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.3);color:#fca5a5}
.hdr-btn-danger:hover{background:rgba(220,38,38,.28);color:#fff}

/* TABS */
.tabs-bar{background:var(--navy);display:flex;padding:0 1.25rem;border-top:1px solid rgba(255,255,255,.07)}
.tab-btn{background:none;border:none;color:rgba(255,255,255,.42);padding:.58rem 1.1rem;font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
.main{padding:1.25rem;max-width:1600px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* CARDS */
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:1.2rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-title{font-weight:600;color:var(--navy);margin-bottom:1rem;padding-bottom:.65rem;border-bottom:1px solid var(--border);font-size:.88rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.sec-title{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--navy);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
.badge-count{background:var(--navy);color:#fff;border-radius:99px;padding:.08rem .45rem;font-family:'IBM Plex Sans',sans-serif;font-size:.7rem;font-weight:600}

/* STATS */
.stats-row{display:flex;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;flex:1;min-width:95px}
.stat-val{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy);line-height:1.1}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-top:.15rem;text-transform:uppercase;letter-spacing:.04em}

/* FORMS */
.form-row{display:flex;gap:.65rem;margin-bottom:.85rem;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:.28rem;flex:1;min-width:130px}
.form-group.narrow{max-width:155px}
.form-group.wide{flex:2}
label{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
select,input[type=text],input[type=number],input[type=email],input[type=password],textarea{border:1px solid var(--border2);border-radius:6px;padding:.4rem .65rem;font-family:inherit;font-size:.84rem;color:var(--text);background:#fff;outline:none;transition:border-color .18s;width:100%}
select:focus,input:focus,textarea:focus{border-color:var(--navy)}
textarea{resize:vertical;min-height:56px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .95rem;border-radius:6px;border:none;font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover:not(:disabled){background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover:not(:disabled){background:var(--gold2)}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--border2)}.btn-outline:hover:not(:disabled){background:var(--bg)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover:not(:disabled){opacity:.88}
.btn-danger{background:var(--err);color:#fff}.btn-danger:hover:not(:disabled){opacity:.88}
.btn-sm{padding:.28rem .7rem;font-size:.74rem}
.btn-xs{padding:.16rem .45rem;font-size:.68rem}
.btn-group{display:flex;gap:.45rem;flex-wrap:wrap}
.ml-auto{margin-left:auto}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff}
thead th{background:var(--navy);color:#fff;padding:.48rem .68rem;text-align:left;font-weight:500;font-size:.7rem;letter-spacing:.03em;white-space:nowrap;position:sticky;top:0;z-index:1}
thead th.center,td.center{text-align:center}
tbody tr:nth-child(even){background:#f8f9fc}
tbody tr:hover{background:#eef2ff}
td{padding:.4rem .68rem;border-bottom:1px solid #edf0f7;vertical-align:middle}

/* NIVELES / NOTAS */
.niv{display:inline-block;padding:.1rem .48rem;border-radius:999px;font-size:.67rem;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.niv-P{background:#fee2e2;color:#991b1b}.niv-B{background:#fef3c7;color:#7c2d12}
.niv-A{background:#dbeafe;color:#1e40af}.niv-V{background:#dcfce7;color:#14532d}
.niv-N{background:#f3f4f6;color:#9ca3af}
.nota-cell{text-align:center;padding:.28rem .35rem!important}
.nota-pill{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.73rem;font-weight:700;white-space:nowrap;border:2px solid transparent}
.nota-V{background:#dcfce7;color:#14532d;border-color:#86efac}
.nota-A{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.nota-B{background:#fef3c7;color:#7c2d12;border-color:#fcd34d}
.nota-P{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.nota-N{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb}
.cell-stack{display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.1rem 0}
.etq-tag{display:inline-block;padding:.08rem .42rem;border-radius:4px;font-size:.64rem;font-weight:600;white-space:nowrap}
.etq-P{background:#fee2e2;color:#991b1b}.etq-B{background:#fef3c7;color:#7c2d12}
.etq-A{background:#dbeafe;color:#1e40af}.etq-V{background:#dcfce7;color:#14532d}

/* ALERTS */
.alert{padding:.6rem .9rem;border-radius:7px;font-size:.8rem;margin-bottom:.85rem}
.alert-ok{background:#dcfce7;color:#14532d;border:1px solid #86efac}
.alert-warn{background:#fef3c7;color:#7c2d12;border:1px solid #fcd34d}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.alert-err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}

/* FILE DROP */
.file-drop{border:2px dashed var(--border2);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;color:var(--muted);background:#fafbfe}
.file-drop:hover,.file-drop.over{border-color:var(--navy);background:#eef2ff;color:var(--navy)}
input[type=file]{display:none}

/* STEPS */
.steps{display:flex;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1.2rem}
.step{flex:1;text-align:center;padding:.52rem .4rem;font-size:.72rem;color:var(--muted);border-right:1px solid var(--border)}
.step:last-child{border-right:none}
.step.active{background:var(--navy);color:#fff;font-weight:600}

/* REPORTS */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.2rem}
.rep-card{border:2px solid var(--border);border-radius:9px;padding:.95rem;cursor:pointer;transition:all .2s;background:#fff}
.rep-card:hover{border-color:var(--navy2);background:#f7f9ff}
.rep-card.sel{border-color:var(--gold);background:#fffdf5}
.rep-icon{font-size:1.25rem;margin-bottom:.3rem}
.rep-title{font-weight:600;color:var(--navy);margin-bottom:.18rem;font-size:.85rem}
.rep-desc{font-size:.73rem;color:var(--muted);line-height:1.4}
.rep-cfg{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;margin-bottom:1rem}
.rep-cfg-title{font-size:.73rem;font-weight:700;color:var(--navy);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.04em}
.rep-cfg-row{display:flex;align-items:center;gap:.55rem;padding:.3rem 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.rep-cfg-row:last-child{border-bottom:none}
.rep-cfg-nivel{min-width:95px;font-size:.76rem;font-weight:600}
.rep-chk{display:inline-flex;align-items:center;gap:.22rem;padding:.18rem .5rem;border-radius:6px;border:1.5px solid var(--border2);background:#fff;font-size:.71rem;cursor:pointer;transition:all .18s;user-select:none}
.rep-chk:hover{border-color:var(--navy2)}
.rep-chk.on{border-color:var(--navy);background:#eef2ff;color:var(--navy);font-weight:700}

/* NIVEL FILTERS */
.niv-filters{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.85rem}
.niv-fbtn{border:2px solid var(--border2);background:#fff;border-radius:999px;padding:.26rem .8rem;font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .18s}
.niv-fbtn.on-P{border-color:#991b1b;background:#fee2e2;color:#991b1b}
.niv-fbtn.on-B{border-color:#7c2d12;background:#fef3c7;color:#7c2d12}
.niv-fbtn.on-A{border-color:#1e40af;background:#dbeafe;color:#1e40af}
.niv-fbtn.on-V{border-color:#14532d;background:#dcfce7;color:#14532d}

/* UTILS */
.chip{display:inline-flex;align-items:center;gap:.25rem;background:var(--navy);color:#fff;border-radius:999px;padding:.1rem .45rem;font-size:.67rem;font-weight:600}
.chip-gold{background:var(--gold);color:var(--navy)}
.chip-ok{background:var(--ok)}
.chip-warn{background:var(--warn)}
.grup-badge{display:inline-block;background:#e0e7ff;color:#3730a3;border-radius:4px;padding:.05rem .38rem;font-size:.67rem;font-weight:700}
.empty{text-align:center;padding:2.5rem;color:var(--muted)}
.empty-icon{font-size:1.8rem;margin-bottom:.35rem}
.flex{display:flex}.gap{gap:.65rem}.gap-sm{gap:.4rem}.items-c{align-items:center}.wrap{flex-wrap:wrap}
.mb{margin-bottom:.65rem}.mb2{margin-bottom:1.1rem}
.text-sm{font-size:.76rem}.text-muted{color:var(--muted)}.bold{font-weight:600}
.search-wrap{position:relative;max-width:250px;flex:1}
.search-wrap input{padding-left:1.75rem;font-size:.8rem}
.search-icon{position:absolute;left:.52rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.82rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:14px;padding:1.5rem;max-width:500px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.22);max-height:90vh;overflow-y:auto;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--navy);margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:600;display:flex;align-items:center;justify-content:center;padding:1rem}
.confirm-box{background:#fff;border-radius:14px;padding:1.65rem;max-width:370px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.confirm-icon{font-size:1.9rem;margin-bottom:.4rem;text-align:center}
.confirm-title{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--navy);margin-bottom:.35rem;text-align:center}
.confirm-msg{font-size:.82rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:1.2rem}
.confirm-btns{display:flex;gap:.65rem}
.confirm-btn-ok{flex:1;padding:.58rem;border-radius:8px;border:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .18s}
.confirm-btn-cancel{flex:1;padding:.58rem;border-radius:8px;border:1px solid var(--border2);background:#fff;font-family:inherit;font-size:.85rem;cursor:pointer;color:var(--muted)}
.confirm-btn-cancel:hover{background:var(--bg)}

/* TOAST */
#toast-container{position:fixed;bottom:1.25rem;right:1.25rem;z-index:9998;display:flex;flex-direction:column;gap:.45rem}
.toast{padding:.68rem 1rem;border-radius:8px;font-size:.8rem;font-weight:500;max-width:320px;animation:slideIn .22s ease;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast-ok{background:#14532d;color:#dcfce7}
.toast-err{background:#7f1d1d;color:#fee2e2}
.toast-info{background:var(--navy2);color:#fff}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

/* SAVING */
.saving-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:9999}
.saving-bar.show{animation:progress 1.2s ease infinite}
@keyframes progress{0%{transform:scaleX(0)}50%{transform:scaleX(.6)}100%{transform:scaleX(1)}}

/* PRINT */
@media print{
  .hdr,.tabs-bar,.btn,.no-print,.form-row,label,.rep-grid,.rep-cfg{display:none!important}
  .print-header{display:block!important}
  .card{border:none;padding:0;box-shadow:none}
  .tbl-wrap{border:none;box-shadow:none}
  table{font-size:.68rem}
  thead th{background:var(--navy)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.print-header{display:none;margin-bottom:1.2rem}
.print-header h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:.2rem}
.print-header p{font-size:.8rem;color:var(--muted)}

@media print {
  .tbl-wrap { max-height: none !important; overflow: visible !important; }
  .rep-cfg, .no-print { display: none !important; }
  .card { border: none; box-shadow: none; }
  thead th { background: var(--navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div id="saving-bar" class="saving-bar"></div>
<div id="toast-container"></div>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set, push, remove, update, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ───────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAGVal6rv6EN7qGgubdJTKX7WRKwFmMASg",
  authDomain: "tierragradebook.firebaseapp.com",
  databaseURL: "https://tierragradebook-default-rtdb.firebaseio.com",
  projectId: "tierragradebook",
  storageBucket: "tierragradebook.firebasestorage.app",
  messagingSenderId: "220501905896",
  appId: "1:220501905896:web:a6830bde3055379483945d"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getDatabase(app);
const provider = new GoogleAuthProvider();

// ── State ─────────────────────────────────────────────────
let CURRENT_USER     = null;
let CURRENT_MATERIA  = null;  // { id, nombre }
let USER_MATERIAS    = [];
let DB               = { config:{}, alumnos:{}, ra:{}, ce:{}, ev:{}, niveles:{}, notas:{}, etiquetas:{} };
let DB_LISTENERS     = [];

// ── Screen management ────────────────────────────────────
function showScreen(id) {
  ['screen-loading','screen-login','screen-materia','screen-app'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
function setLoadingMsg(msg, showSpinner=true, action='') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-spinner').classList.toggle('hidden', !showSpinner);
  document.getElementById('loading-action').innerHTML = action;
}

// ── Auth ─────────────────────────────────────────────────
window.signInWithGoogle = async function() {
  document.getElementById('login-err').textContent = '';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('login-err').textContent = 'Error al iniciar sesión: ' + e.message;
  }
};

window.signOut = async function() {
  const ok = await tgbConfirm({ title:'Cerrar sesión', msg:'¿Cerrar la sesión?', okLabel:'Salir' });
  if (!ok) return;
  detachListeners();
  CURRENT_MATERIA = null;
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user => {
  if (user) {
    CURRENT_USER = user;
    showScreen('screen-loading');
    setLoadingMsg('Verificando acceso...');
    await loadUserMaterias();
  } else {
    CURRENT_USER = null;
    showScreen('screen-login');
  }
});

// ── Materias / Permisos ───────────────────────────────────
async function loadUserMaterias() {
  const email = CURRENT_USER.email.toLowerCase();
  try {
    // Leer todas las materias
    const [matSnap, permSnap] = await Promise.all([
      get(ref(db, 'materias')),
      get(ref(db, 'permisos'))
    ]);
    const materias = matSnap.val() || {};
    const permisos = permSnap.val() || {};

    // Filtrar las que tiene acceso
    USER_MATERIAS = Object.entries(materias)
      .filter(([id]) => {
        const mp = permisos[id] || {};
        return Object.values(mp).some(e => e.toLowerCase() === email);
      })
      .map(([id, data]) => ({ id, nombre: data.nombre || id }));

    if (!USER_MATERIAS.length) {
      setLoadingMsg('❌ Tu email no tiene acceso a ninguna materia.\nContactá al administrador.', false,
        '<button onclick="signOut()" style="margin-top:.75rem;padding:.4rem 1rem;border-radius:6px;border:none;background:var(--gold);color:var(--navy);font-weight:600;cursor:pointer">Salir</button>');
      return;
    }

    if (USER_MATERIAS.length === 1) {
      await enterMateria(USER_MATERIAS[0]);
    } else {
      renderMateriaSelector();
    }
  } catch(e) {
    setLoadingMsg('❌ Error: ' + e.message, false,
      '<button onclick="location.reload()" style="margin-top:.75rem;padding:.4rem 1rem;border-radius:6px;border:none;background:var(--gold);color:var(--navy);font-weight:600;cursor:pointer">🔄 Reintentar</button>');
  }
}

function renderMateriaSelector() {
  document.getElementById('mat-user').textContent = '👤 ' + CURRENT_USER.email;
  document.getElementById('mat-list').innerHTML = USER_MATERIAS.map(m =>
    `<button class="mat-btn" onclick="window._selectMateria('${m.id}','${esc(m.nombre)}')">
      📚 ${esc(m.nombre)}
      <div class="mat-btn-sub">${m.id}</div>
    </button>`
  ).join('');
  showScreen('screen-materia');
}

window._selectMateria = async function(id, nombre) {
  showScreen('screen-loading');
  setLoadingMsg('Cargando ' + nombre + '...');
  await enterMateria({ id, nombre });
};

window.showMateria = function() {
  detachListeners();
  renderMateriaSelector();
};

async function enterMateria(materia) {
  CURRENT_MATERIA = materia;
  detachListeners();
  setLoadingMsg('Cargando ' + materia.nombre + '...');
  try {
    await loadAllData();
    renderApp();
  } catch(e) {
    setLoadingMsg('❌ Error al cargar: ' + e.message, false,
      '<button onclick="location.reload()" style="margin-top:.75rem;padding:.4rem 1rem;border-radius:6px;border:none;background:var(--gold);color:var(--navy);font-weight:600;cursor:pointer">🔄 Reintentar</button>');
  }
}

// ── Data loading ─────────────────────────────────────────
async function loadAllData() {
  const mid = CURRENT_MATERIA.id;
  const snap = await get(ref(db, `datos/${mid}`));
  const data = snap.val() || {};
  DB.config    = data.config    || { materia: CURRENT_MATERIA.nombre, año: new Date().getFullYear() };
  DB.alumnos   = data.alumnos   || {};
  DB.ra        = data.ra        || {};
  DB.ce        = data.ce        || {};
  DB.ev        = data.ev        || {};
  DB.niveles   = data.niveles   || getDefaultNiveles();
  DB.notas     = data.notas     || {};
  DB.etiquetas = data.etiquetas || {};
}

function getDefaultNiveles() {
  return {
    P: { nombre:'Principiante', code:'P', desde:0,    hasta:3.99 },
    B: { nombre:'Básico',       code:'B', desde:4,    hasta:6.99 },
    A: { nombre:'Autónomo',     code:'A', desde:7,    hasta:8.99 },
    V: { nombre:'Avanzado',     code:'V', desde:9,    hasta:10   },
  };
}

function detachListeners() {
  DB_LISTENERS.forEach(({ r }) => off(r));
  DB_LISTENERS = [];
}

// ── DB helpers ────────────────────────────────────────────
function dbRef(path) { return ref(db, `datos/${CURRENT_MATERIA.id}/${path}`); }

async function dbSet(path, val) {
  showSaving(true);
  await set(dbRef(path), val);
  showSaving(false);
}
async function dbPush(path, val) {
  showSaving(true);
  const r = await push(dbRef(path), val);
  showSaving(false);
  return r.key;
}
async function dbRemove(path) {
  showSaving(true);
  await remove(dbRef(path));
  showSaving(false);
}
async function dbUpdate(path, val) {
  showSaving(true);
  await update(dbRef(path), val);
  showSaving(false);
}

// ── Render app ────────────────────────────────────────────
function renderApp() {
  document.getElementById('hdr-materia').textContent = DB.config.materia || CURRENT_MATERIA.nombre;
  document.getElementById('hdr-user').textContent    = CURRENT_USER.email;
  document.getElementById('btn-cambiar').classList.toggle('hidden', USER_MATERIAS.length <= 1);
  showScreen('screen-app');
  switchTab('alumnos');
}

// ── Tab navigation ────────────────────────────────────────
let currentTab = 'alumnos';
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id===`panel-${tab}`));
  if (tab==='alumnos')  renderAlumnos();
  if (tab==='importar') renderImportar();
  if (tab==='reportes') renderReportes();
  if (tab==='config')   renderConfig();
}

// ── Helpers ───────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function objArr(obj) { return Object.entries(obj||{}).map(([k,v])=>({_key:k,...v})); }
function sortAlumnos(arr){ return [...arr].sort((a,b)=>(a.apellido+a.nombre).localeCompare(b.apellido+b.nombre,'es')); }
function showSaving(on){ document.getElementById('saving-bar').classList.toggle('show', on); }

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

function tgbConfirm({ title='¿Confirmar?', msg='', okLabel='Aceptar', danger=false }={}) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    const okBg = danger ? '#dc2626' : 'var(--navy)';
    overlay.innerHTML = `<div class="confirm-box">
      <div class="confirm-icon">${danger?'⚠️':'❓'}</div>
      <div class="confirm-title">${title}</div>
      ${msg?`<div class="confirm-msg">${msg}</div>`:''}
      <div class="confirm-btns">
        <button class="confirm-btn-ok" style="background:${okBg};color:#fff" id="cfm-ok">${okLabel}</button>
        <button class="confirm-btn-cancel" id="cfm-cancel">Cancelar</button>
      </div></div>`;
    document.body.appendChild(overlay);
    const close = v => { overlay.remove(); resolve(v); };
    overlay.querySelector('#cfm-ok').onclick    = ()=>close(true);
    overlay.querySelector('#cfm-cancel').onclick = ()=>close(false);
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    const kh = e=>{ if(e.key==='Enter'){document.removeEventListener('keydown',kh);close(true);} if(e.key==='Escape'){document.removeEventListener('keydown',kh);close(false);} };
    document.addEventListener('keydown',kh);
  });
}

function openModal(id, content) {
  const el = document.getElementById(id);
  if (!el) { console.error('Modal container not found:', id); return; }
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay';
  wrap.addEventListener('click', function(e) { if(e.target===wrap) closeModal(id); });
  const box = document.createElement('div');
  box.className = 'modal';
  box.innerHTML = content;
  wrap.appendChild(box);
  el.innerHTML = '';
  el.appendChild(wrap);
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = '';
}

// ── Niveles helpers ───────────────────────────────────────
function getNivelArr() { return objArr(DB.niveles).sort((a,b)=>a.desde-b.desde); }
function getNivel(nota) {
  if (nota===null||nota===undefined||isNaN(nota)) return null;
  return getNivelArr().find(l => nota>=l.desde && nota<=l.hasta) || null;
}
function notaFmtStr(nota) {
  if (nota===null||nota===undefined||isNaN(nota)) return '—';
  return (Math.round(nota*100)/100).toFixed(2);
}

// ── Etiquetas helpers ─────────────────────────────────────
const LS_CM = 'tgb_cm_';
let repCellMode = {};

function loadCellMode() {
  try { repCellMode = JSON.parse(localStorage.getItem(LS_CM+(CURRENT_MATERIA?.id||'x'))||'{}'); }
  catch(e){ repCellMode={}; }
}
function saveCellMode() {
  localStorage.setItem(LS_CM+(CURRENT_MATERIA?.id||'x'), JSON.stringify(repCellMode));
}
function getCellMode(code) { return repCellMode[code]||{nota:true,types:[]}; }
function getEtqTipos() {
  return [...new Set(objArr(DB.etiquetas).map(e=>String(e.tipo||'').trim()))].filter(Boolean);
}
function getEtq(tipo, code) {
  const row = objArr(DB.etiquetas).find(e=>String(e.tipo||'').trim()===tipo&&String(e.nivel_code||'').trim()===code);
  return row ? String(row.etiqueta||'').trim() : null;
}
function buildCell(nota) {
  if (nota===null||nota===undefined||isNaN(nota))
    return '<td class="nota-cell"><span class="nota-pill nota-N">—</span></td>';
  const nv=getNivel(nota), code=nv?nv.code:'N';
  const mode=getCellMode(code);
  const items=[];
  getEtqTipos().forEach(tipo=>{
    if(mode.types&&mode.types.includes(tipo)){
      const etq=getEtq(tipo,code);
      if(etq) items.push(`<span class="etq-tag etq-${code}">${esc(etq)}</span>`);
    }
  });
  if(mode.nota!==false) items.push(`<span class="nota-pill nota-${code}">${notaFmtStr(nota)}</span>`);
  if(!items.length) items.push(`<span class="nota-pill nota-${code}">${notaFmtStr(nota)}</span>`);
  return `<td class="nota-cell">${items.length===1?items[0]:`<div class="cell-stack">${items.join('')}</div>`}</td>`;
}
function getBestNota(email, raId, ceId) {
  const gs = objArr(DB.notas).filter(n=>
    String(n.email||'').toLowerCase()===email.toLowerCase()&&n.raId===raId&&n.ceId===ceId
  );
  if(!gs.length) return null;
  return Math.max(...gs.map(n=>parseFloat(n.nota)||0));
}

function renderCfgPanel() {
  loadCellMode();
  const tipos=getEtqTipos();
  const niveles=getNivelArr();
  if(!niveles.length) return '';
  const rows=niveles.map(nv=>{
    const mode=getCellMode(nv.code);
    const notaOn=mode.nota!==false;
    let checks=`<span class="rep-chk ${notaOn?'on':''}" onclick="toggleCellNota('${nv.code}')">📊 Nota</span>`;
    tipos.forEach(tipo=>{
      const on=mode.types&&mode.types.includes(tipo);
      checks+=`<span class="rep-chk ${on?'on':''}" onclick="toggleCellTipo('${nv.code}','${tipo}')">🏷 ${esc(tipo)}</span>`;
    });
    return `<div class="rep-cfg-row"><span class="rep-cfg-nivel"><span class="niv niv-${nv.code}">${esc(nv.nombre)}</span></span><div style="display:flex;gap:.35rem;flex-wrap:wrap">${checks}</div></div>`;
  }).join('');
  return `<div class="rep-cfg no-print"><div class="rep-cfg-title">⚙️ Mostrar en cada celda</div>${rows}</div>`;
}



// ═══════════════════════════════════════════════════════════
//  TAB: ALUMNOS
// ═══════════════════════════════════════════════════════════
let alumSearch='', alumGrupo='todos';

function renderAlumnos(){
  const all=sortAlumnos(objArr(DB.alumnos));
  const grupos=[...new Set(all.map(s=>s.grupo))].sort((a,b)=>a-b);
  const filtered=all.filter(function(s){
    const q=alumSearch.toLowerCase();
    return (!q||(s.apellido+' '+s.nombre+' '+s.email).toLowerCase().includes(q))
      &&(alumGrupo==='todos'||String(s.grupo)===alumGrupo);
  });
  const totalNotas=objArr(DB.notas).length;
  const instancias=[...new Set(objArr(DB.notas).map(n=>n.evId))].length;

  const grpOpts = grupos.filter(function(g){return g>0;}).map(function(g){
    return '<option value="'+g+'" '+(alumGrupo===String(g)?'selected':'')+'>Grupo '+g+'</option>';
  }).join('');

  const rowsHTML = filtered.length===0
    ? '<tr><td colspan="7"><div class="empty"><div class="empty-icon">&#128269;</div>Sin resultados</div></td></tr>'
    : filtered.map(function(s){
        const cnt=objArr(DB.notas).filter(function(n){return String(n.email||'').toLowerCase()===String(s.email||'').toLowerCase();}).length;
        return '<tr>'+
          '<td><strong>'+esc(s.apellido)+'</strong>, '+esc(s.nombre)+'</td>'+
          '<td class="text-sm text-muted">'+esc(s.email)+'</td>'+
          '<td class="center">'+esc(s.legajo||'-')+'</td>'+
          '<td class="center">'+(s.año||'-')+'</td>'+
          '<td class="center">'+(s.grupo>0?'<span class="grup-badge">'+s.grupo+'</span>':'-')+'</td>'+
          '<td class="center"><span class="chip '+(cnt>0?'chip-ok':'')+'">'+cnt+'</span></td>'+
          '<td class="center no-print"><div style="display:flex;gap:.3rem;justify-content:center">'+
            '<button class="btn btn-outline btn-xs" data-key="'+s._key+'" data-action="edit">&#9999;</button>'+
            '<button class="btn btn-danger btn-xs" data-key="'+s._key+'" data-name="'+esc(s.apellido)+'" data-action="del">&#128465;</button>'+
          '</div></td>'+
        '</tr>';
      }).join('');

  document.getElementById('panel-alumnos').innerHTML =
    '<div class="sec-title">&#128101; Alumnos <span class="badge-count">'+all.length+'</span></div>'+
    '<div class="stats-row">'+
      '<div class="stat"><div class="stat-val">'+all.length+'</div><div class="stat-lbl">Alumnos</div></div>'+
      '<div class="stat"><div class="stat-val">'+grupos.filter(function(g){return g>0;}).length+'</div><div class="stat-lbl">Grupos</div></div>'+
      '<div class="stat"><div class="stat-val">'+totalNotas+'</div><div class="stat-lbl">Notas</div></div>'+
      '<div class="stat"><div class="stat-val">'+instancias+'</div><div class="stat-lbl">Instancias</div></div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="flex gap items-c mb wrap no-print">'+
        '<div class="search-wrap">'+
          '<span class="search-icon">&#128269;</span>'+
          '<input type="text" id="alum-search" placeholder="Buscar..." value="'+esc(alumSearch)+'" style="width:100%">'+
        '</div>'+
        '<div class="form-group narrow" style="flex:none">'+
          '<select id="alum-grupo-sel">'+
            '<option value="todos" '+(alumGrupo==='todos'?'selected':'')+'>Todos los grupos</option>'+
            grpOpts+
            '<option value="0" '+(alumGrupo==='0'?'selected':'')+'>Sin grupo</option>'+
          '</select>'+
        '</div>'+
        '<button class="btn btn-primary btn-sm no-print" id="btn-agregar-alumno">+ Agregar</button>'+
        '<button class="btn btn-outline btn-sm no-print" id="btn-importar-lista">&#128203; Importar lista</button>'+
      '</div>'+
      '<div class="tbl-wrap"><table>'+
        '<thead><tr>'+
          '<th>Apellido y Nombre</th><th>Email</th>'+
          '<th class="center">Legajo</th><th class="center">Ano</th><th class="center">Grp</th>'+
          '<th class="center">Notas</th><th class="center no-print">Acciones</th>'+
        '</tr></thead>'+
        '<tbody>'+rowsHTML+'</tbody>'+
      '</table></div>'+
    '</div>'+
    '<div id="alumnos-modal"></div>';

  // Attach events
  document.getElementById('alum-search').addEventListener('input', function(){
    alumSearch=this.value; renderAlumnos();
  });
  document.getElementById('alum-grupo-sel').addEventListener('change', function(){
    alumGrupo=this.value; renderAlumnos();
  });
  document.getElementById('btn-agregar-alumno').addEventListener('click', function(){ openAlumnoModal(null); });
  document.getElementById('btn-importar-lista').addEventListener('click', function(){ openImportListaModal(); });

  // Table action buttons via delegation
  document.querySelector('#panel-alumnos tbody').addEventListener('click', function(e){
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const key = btn.dataset.key;
    if(btn.dataset.action==='edit') openAlumnoModal(key);
    if(btn.dataset.action==='del')  delAlumno(key, btn.dataset.name);
  });

  // Keep focus on search if user was typing
  if(alumSearch){
    const inp=document.getElementById('alum-search');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
  }
}

window.saveAlumno = async function(key){
  const ap  = document.getElementById('m-ap').value.trim().toUpperCase();
  const nom = document.getElementById('m-nom').value.trim().toUpperCase();
  const em  = document.getElementById('m-em').value.trim().toLowerCase();
  const leg = document.getElementById('m-leg').value.trim();
  const año = parseInt(document.getElementById('m-ano').value)||new Date().getFullYear();
  const grp = parseInt(document.getElementById('m-grp').value)||0;
  if(!ap||!nom||!em){toast('Apellido, nombre y email son obligatorios','err');return;}
  const data={apellido:ap,nombre:nom,email:em,legajo:leg,año,grupo:grp};
  if(key){
    await dbSet(`alumnos/${key}`, data);
    DB.alumnos[key]=data;
    toast('✅ Alumno actualizado');
  } else {
    const k=await dbPush('alumnos', data);
    DB.alumnos[k]=data;
    toast('✅ Alumno agregado');
  }
  closeModal('alumnos-modal');
  renderAlumnos();
};

window.delAlumno = async function(key, nombre){
  const ok=await tgbConfirm({title:'Eliminar alumno',msg:`¿Eliminar a <strong>${esc(nombre)}</strong>?`,okLabel:'Eliminar',danger:true});
  if(!ok) return;
  const email=DB.alumnos[key]?.email?.toLowerCase();
  await dbRemove(`alumnos/${key}`);

function readListaFile(f) {
  // Try UTF-8 first, fallback to latin1 if characters look wrong
  const reader = new FileReader();
  reader.onload = function(e) {
    let text = e.target.result;
    // If common latin chars appear garbled, re-read as latin1
    if (text.includes('\uFFFD') || /[\x80-\x9F]/.test(text)) {
      const r2 = new FileReader();
      r2.onload = function(e2) {
        document.getElementById('import-txt').value = e2.target.result;
      };
      r2.readAsText(f, 'ISO-8859-1');
    } else {
      document.getElementById('import-txt').value = text;
    }
    document.getElementById('lista-drop-icon').textContent = '✅';
    document.getElementById('lista-drop-name').textContent = f.name;
  };
  reader.readAsText(f, 'UTF-8');
}

// ── CSV parsing ──────────────────────────────────────────
function parseCSVLine(line) {
  const fields=[]; let i=0;
  while(i<=line.length){
    if(i===line.length){fields.push('');break;}
    if(line[i]==='"'){
      let field='';i++;
      while(i<line.length){
        if(line[i]==='"'&&line[i+1]==='"'){field+='"';i+=2;}
        else if(line[i]==='"'){i++;break;}
        else{field+=line[i++];}
      }
      fields.push(field);if(line[i]===',')i++;else break;
    } else {
      let field='';
      while(i<line.length&&line[i]!==',')field+=line[i++];
      fields.push(field);if(line[i]===',')i++;else break;
    }
  }
  return fields;
}

window.parseCSV = function() {
  if(!impFile) return;
  var btn=document.getElementById('btn-proc');
  if(btn){btn.disabled=true;btn.textContent='Procesando...';}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result;
      var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
      if(!lines.length){toast('Archivo vacio','err');if(btn){btn.disabled=false;btn.textContent='Procesar CSV';}return;}
      var fields=parseCSVLine(lines[0]);
      var rows=[];
      for(var i=1;i<lines.length;i++){
        var vals=parseCSVLine(lines[i]);
        if(!vals.some(function(v){return v.trim();})) continue;
        var obj={};
        fields.forEach(function(h,j){obj[h]=vals[j]!==undefined?vals[j]:'';});
        rows.push(obj);
      }
      var filtered=rows.filter(function(r){
        var ap=r['Apellido(s)']||r['Apellidos']||'';
        return ap.trim()&&ap.trim().toLowerCase()!=='promedio general';
      });
      if(!filtered.length){toast('Sin filas de alumnos en el CSV','err');if(btn){btn.disabled=false;btn.textContent='Procesar CSV';}return;}
      var gradeCol=fields.find(function(h){return /calificaci[oó]n\//i.test(h);});
      var maxNota=2;
      if(gradeCol){var m=gradeCol.match(/\/(\d+[,.]\d*)/);if(m)maxNota=parseFloat(m[1].replace(',','.'))||2;}
      var alumnos=objArr(DB.alumnos);
      var notas=objArr(DB.notas);
      impPreview=filtered.map(function(r){
        var email=(r['Dirección de correo']||r['Email']||'').trim().toLowerCase();
        var apellido=(r['Apellido(s)']||r['Apellidos']||'').trim();
        var nombre=(r['Nombre']||'').trim();
        var rawStr=gradeCol?(r[gradeCol]||'0'):'0';
        var rawNota=parseFloat(rawStr.replace(',','.').replace(/[^\d.]/g,''))||0;
        var nota=Math.round((rawNota/maxNota)*10*100)/100;
        var existing=alumnos.find(function(s){return String(s.email||'').toLowerCase()===email;});
        var dup=notas.find(function(n){return String(n.email||'').toLowerCase()===email&&n.raId===impRA&&n.ceId===impCE&&n.evId===impEV;});
        return{email:email,apellido:apellido,nombre:nombre,rawNota:rawNota,nota:nota,st:!existing?'new':dup?'dup':'ok'};
      });
      impStep=3;
      renderImportar();
    }catch(err){
      toast('Error: '+err.message,'err');
      if(btn){btn.disabled=false;btn.textContent='Procesar CSV';}
    }
  };
  reader.onerror=function(){toast('No se pudo leer el archivo','err');if(btn){btn.disabled=false;btn.textContent='Procesar CSV';}};
  reader.readAsText(impFile,'UTF-8');
};

function exportTableToExcel(title, students, ceIds) {
  if(!students || !students.length) { toast('Sin datos para exportar','err'); return; }
  
  // Build header rows
  const raIds = [...new Set(ceIds.map(function(ceId){
    const c=DB.ce[ceId]; return c?c.raId:'?';
  }))].sort();
  
  // Row 1: title
  // Row 2: RA headers
  // Row 3: CE headers  
  // Rows 4+: data
  
  let csv = '\uFEFF'; // BOM for Excel UTF-8
  
  // Title row
  csv += '"'+title.replace(/"/g,'""')+'"\n';
  csv += '"'+esc(DB.config.materia||'')+'","Año '+DB.config.año+'","'+new Date().toLocaleDateString('es-AR')+'"\n';
  csv += '\n';
  
  // RA header row
  csv += '"Alumno","Grupo"';
  raIds.forEach(function(ra){
    const raCEs = ceIds.filter(function(ceId){ return DB.ce[ceId]&&DB.ce[ceId].raId===ra; });
    csv += ',"'+ra+'"';
    for(var i=1; i<raCEs.length; i++) csv += ',""';
  });
  csv += '\n';
  
  // CE header row
  csv += '"","" ';
  ceIds.forEach(function(ceId){
    const c=DB.ce[ceId];
    const displayId = c&&c.id ? c.id : ceId.replace(/_/g,'.');
    csv += ',"'+displayId.replace(/"/g,'""')+'"';
  });
  csv += '\n';
  
  // Data rows
  students.forEach(function(s){
    csv += '"'+esc(s.apellido)+', '+esc(s.nombre)+'","'+(s.grupo>0?s.grupo:'')+'"';
    ceIds.forEach(function(ceId){
      const c = DB.ce[ceId];
      if(!c){ csv += ',""'; return; }
      const notas = objArr(DB.notas).filter(function(n){
        return String(n.email||'').toLowerCase()===String(s.email||'').toLowerCase() && n.ceId===ceId;
      });
      if(!notas.length){ csv += ',""'; return; }
      const best = Math.max.apply(null, notas.map(function(n){ return parseFloat(n.nota)||0; }));
      const nv = getNivel(best);
      const code = nv ? nv.code : 'N';
      const mode = getCellMode(code);
      const tipos = getEtqTipos();
      var cellVal = '';
      // Add etiquetas that are enabled
      tipos.forEach(function(tipo){
        if(mode.types && mode.types.includes(tipo)){
          const etq = getEtq(tipo, code);
          if(etq) cellVal += (cellVal?'  ':'')+etq;
        }
      });
      // Add nota if enabled (or if nothing else)
      if(mode.nota !== false || !cellVal){
        cellVal += (cellVal?' | ':'')+best.toFixed(2).replace('.',',');
      }
      csv += ',"'+cellVal+'"';
    });
    csv += '\n';
  });
  
  // Download
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/[^a-zA-Z0-9]/g,'_')+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Archivo descargado — abrilo con Excel');
}

// ── Build report table ───────────────────────────────────
function buildRepTable(students, ceIds){
  if(!students.length) return '<div class="empty">Sin alumnos.</div>';
  const raIds=[...new Set(ceIds.map(function(ceId){
    const c=DB.ce[ceId]; return c?c.raId:'?';
  }))].sort();
  const cesByRa={};
  raIds.forEach(function(ra){
    cesByRa[ra]=ceIds.filter(function(ceId){return DB.ce[ceId]&&DB.ce[ceId].raId===ra;});
  });
  const raHeaders=raIds.map(function(ra){
    return '<th colspan="'+cesByRa[ra].length+'" class="center" style="background:var(--navy3)">'+esc(ra)+'</th>';
  }).join('');
  const ceHeaders=ceIds.map(function(ceId){
    const c=DB.ce[ceId];
    const displayId=c&&c.id?c.id:ceId.replace(/_/g,'.');
    return '<th class="center" title="'+esc(displayId)+'">'+esc(displayId)+'</th>';
  }).join('');
  const rows=students.map(function(s){
    return '<tr>'+
      '<td><strong>'+esc(s.apellido)+'</strong>, '+esc(s.nombre)+'</td>'+
      '<td class="center">'+(s.grupo>0?'<span class="grup-badge">'+s.grupo+'</span>':'-')+'</td>'+
      s._cells.join('')+
    '</tr>';
  }).join('');
  return '<div class="tbl-wrap" style="max-height:600px;overflow-y:auto"><table>'+
    '<thead>'+
      '<tr><th rowspan="2">Alumno</th><th rowspan="2" class="center">Grp</th>'+raHeaders+'</tr>'+
      '<tr>'+ceHeaders+'</tr>'+
    '</thead>'+
    '<tbody>'+rows+'</tbody>'+
  '</table></div>';
}

function genNivelResult(){
  const result = document.getElementById('rep-nivel-result');
  if(!result) return;
  repNivelMode = document.getElementById('nivel-mode-sel').value;
  if(!repLevels.length){
    result.innerHTML = '<div class="alert alert-warn">Selecciona al menos un nivel.</div>';
    return;
  }
  const notas = objArr(DB.notas);
  if(!notas.length){
    result.innerHTML = '<div class="alert alert-warn">Sin notas cargadas. Importa un CSV primero.</div>';
    return;
  }
  const niveles = getNivelArr();
  const allCeIds = [...new Set(notas.map(n=>n.ceId))].sort();
  const levelNames = repLevels.map(function(c){
    const l=niveles.find(function(x){return x.code===c;}); return l?l.nombre:c;
  }).join(', ');
  const alumnos = sortAlumnos(objArr(DB.alumnos));
  const filtered = alumnos.filter(function(s){
    const ceConNotas = allCeIds.filter(function(ceId){
      const c=DB.ce[ceId]; return c&&getBestNota(s.email,c.raId,ceId)!==null;
    });
    if(!ceConNotas.length) return false;
    if(repNivelMode==='any') return ceConNotas.some(function(ceId){
      const c=DB.ce[ceId]; const best=getBestNota(s.email,c.raId,ceId);
      const nv=getNivel(best); return nv&&repLevels.includes(nv.code);
    });
    return ceConNotas.every(function(ceId){
      const c=DB.ce[ceId]; const best=getBestNota(s.email,c.raId,ceId);
      const nv=getNivel(best); return nv&&repLevels.includes(nv.code);
    });
  }).map(function(s){
    const cells=allCeIds.map(function(ceId){
      const c=DB.ce[ceId];
      if(!c) return '<td class="nota-cell"><span class="nota-pill nota-N">-</span></td>';
      const best=getBestNota(s.email,c.raId,ceId);
      return best!==null?buildCell(best):'<td class="nota-cell"><span class="nota-pill nota-N">-</span></td>';
    });
    return Object.assign({},s,{_cells:cells});
  });
  window._lastNivelStudents = filtered;
  window._lastNivelCeIds = allCeIds;
  result.innerHTML =
    '<div class="card no-print flex gap items-c" style="margin-bottom:.5rem">'+
      '<span class="text-sm text-muted">'+filtered.length+' alumnos - Nivel: '+esc(levelNames)+'</span>'+
      '<button class="btn btn-outline btn-sm" onclick="window.print()">&#128424; Imprimir</button>'+
      '<button class="btn btn-ok btn-sm" onclick="window.exportNivel(window._lastNivelStudents||[],window._lastNivelCeIds||[])">&#128203; Exportar Excel</button>'+
    '</div>'+
    '<div class="card"><div class="card-title">Filtro por Nivel: <strong>'+esc(levelNames)+'</strong></div>'+
    (filtered.length ? buildRepTable(filtered,allCeIds) : '<div class="empty">Sin alumnos que cumplan la condicion.</div>')+
    '</div>';
}

window.toggleCellNota = function(code){
  loadCellMode();
  if(!repCellMode[code]) repCellMode[code]={nota:true,types:[]};
  repCellMode[code].nota = repCellMode[code].nota===false;
  saveCellMode(); refreshRep();
};
window.toggleCellTipo = function(code,tipo){
  loadCellMode();
  if(!repCellMode[code]) repCellMode[code]={nota:true,types:[]};
  if(!repCellMode[code].types) repCellMode[code].types=[];
  const idx=repCellMode[code].types.indexOf(tipo);
  if(idx>=0) repCellMode[code].types.splice(idx,1); else repCellMode[code].types.push(tipo);
  saveCellMode(); refreshRep();
};

  if(ep) ep.innerHTML=renderCfgPanel();
  if(repType==='instancia') renderRepInstancia();
  else if(repType==='race') renderRepRACE();
  else renderRepNivel();
}

        '<button class="btn btn-primary btn-sm ml-auto no-print" id="btn-add-etq">+ Agregar</button></div>'+
      '<div class="text-sm text-muted mb">Texto que aparece en las celdas de los reportes segun el nivel.</div>'+
      '<div class="tbl-wrap"><table>'+
        '<thead><tr><th>Tipo</th><th>Nivel</th><th>Etiqueta</th><th class="center no-print">Acciones</th></tr></thead>'+
        '<tbody>'+etqRows+'</tbody></table></div>'+
    '</div>'+

    '<div class="card" style="border-color:var(--err)">'+
      '<div class="card-title" style="color:var(--err)">&#9888;&#65039; Zona de Peligro</div>'+
      '<div class="btn-group">'+
        '<button class="btn btn-danger" id="btn-del-all-notas">&#128465; Borrar TODAS las notas</button>'+
      '</div>'+
    '</div>'+
    '<div id="config-modal"></div>';

  // Attach all events via delegation
  document.getElementById('btn-save-config').onclick = window.saveConfig;
  document.getElementById('btn-add-ra').onclick  = function(){ window.openRAModal(null); };
  document.getElementById('btn-add-ce').onclick  = function(){ window.openCEModal(null); };
  document.getElementById('btn-add-ev').onclick  = function(){ window.openEVModal(null); };
  document.getElementById('btn-add-etq').onclick = function(){ window.openEtqModal(null); };
  document.getElementById('btn-del-all-notas').onclick = window.delAllNotas;

  // Table action buttons via event delegation
  document.getElementById('panel-config').addEventListener('click', function(e){
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    const key = btn.dataset.key;
    const action = btn.dataset.action;
    if(action==='edit-ra')  window.openRAModal(key);
    if(action==='del-ra')   window.delRA(key);
    if(action==='edit-ce')  window.openCEModal(key);
    if(action==='del-ce')   window.delCE(key);
    if(action==='edit-ev')  window.openEVModal(key);
    if(action==='del-ev')   window.delEV(key);
    if(action==='edit-etq') window.openEtqModal(key);
    if(action==='del-etq')  window.delEtq(key);
  });
}


window.saveConfig = async function(){
  const mat = document.getElementById('cfg-mat').value.trim();
  const ano = parseInt(document.getElementById('cfg-ano').value)||new Date().getFullYear();
  DB.config = Object.assign({}, DB.config, {materia:mat, año:ano});
  await dbSet('config', DB.config);
  document.getElementById('hdr-materia').textContent = mat;
  toast('Configuracion guardada');
};

window.openRAModal = function(key){
  const r = key ? DB.ra[key] : null;
  const displayId = r ? (r.id||key) : '';
  openModal('config-modal',
    '<div class="modal-title">'+(r?'Editar RA':'+ Nuevo RA')+'</div>'+
    '<div class="form-row">'+
      '<div class="form-group narrow"><label>ID (ej: RA01)</label>'+
        '<input type="text" id="ra-id" value="'+esc(displayId)+'" '+(r?'disabled':'')+'></div>'+
      '<div class="form-group narrow"><label>Peso (0-1)</label>'+
        '<input type="number" id="ra-peso" value="'+(r?r.peso:0.1)+'" step="0.05" min="0" max="1"></div>'+
    '</div>'+
    '<div class="form-group mb2"><label>Descripcion</label>'+
      '<textarea id="ra-nom">'+esc(r?r.nombre||'':'')+'</textarea></div>'+
    '<div class="btn-group">'+
      '<button class="btn btn-ok" id="_btn-ok">Guardar</button>'+
      '<button class="btn btn-outline" id="_btn-cancel">Cancelar</button>'+

  document.getElementById('_btn-ok').onclick = function(){ window.saveRA(key||null); };
  document.getElementById('_btn-cancel').onclick = function(){ closeModal('config-modal'); };
};

window.saveRA = async function(key){
  const rawId = key || document.getElementById('ra-id').value.trim().toUpperCase();
  const nom   = document.getElementById('ra-nom').value.trim();
  const peso  = parseFloat(document.getElementById('ra-peso').value)||0;
  if(!rawId||!nom){ toast('ID y descripcion obligatorios','err'); return; }
  const id   = rawId.replace(/\./g,'_');
  const data = {nombre:nom, peso:peso, id:rawId};
  await dbSet('ra/'+id, data);
  DB.ra[id] = data;
  closeModal('config-modal'); toast('RA guardado'); renderConfig();
};

window.delRA = async function(key){
  const ok = await tgbConfirm({title:'Eliminar RA', msg:'Eliminar '+key+'? Se eliminan sus CEs y notas.', okLabel:'Eliminar', danger:true});
  if(!ok) return;
  Object.keys(DB.ce||{}).filter(function(k){ return DB.ce[k].raId===key; }).forEach(async function(ck){
    await dbRemove('ce/'+ck); delete DB.ce[ck];
  });
  Object.keys(DB.notas||{}).filter(function(k){ return DB.notas[k].raId===key; }).forEach(async function(nk){
    await dbRemove('notas/'+nk); delete DB.notas[nk];
  });
  await dbRemove('ra/'+key); delete DB.ra[key];
  toast('RA eliminado'); renderConfig();
};

window.openCEModal = function(key){
  const c = key ? DB.ce[key] : null;
  const raArr = objArr(DB.ra).sort(function(a,b){ return a._key.localeCompare(b._key); });
  const displayId = c ? (c.id||key.replace(/_/g,'.')) : '';
  const raOpts = raArr.map(function(r){
    const sel = c&&(c.raId===r._key||c.raId===r.id) ? 'selected' : '';
    return '<option value="'+r._key+'" '+sel+'>'+(r.id||r._key)+'</option>';
  }).join('');
  openModal('config-modal',
    '<div class="modal-title">'+(c?'Editar CE':'+ Nuevo CE')+'</div>'+
    '<div class="form-row">'+
      '<div class="form-group narrow"><label>ID (ej: C.E.01.01)</label>'+
        '<input type="text" id="ce-id" value="'+esc(displayId)+'" '+(c?'disabled':'')+'></div>'+
      '<div class="form-group narrow"><label>RA</label>'+
        '<select id="ce-ra">'+raOpts+'</select></div>'+
      '<div class="form-group narrow"><label>Peso (0-1)</label>'+
        '<input type="number" id="ce-peso" value="'+(c?c.peso:0.2)+'" step="0.05" min="0" max="1"></div>'+
    '</div>'+
    '<div class="form-group mb2"><label>Descripcion</label>'+
      '<textarea id="ce-nom">'+esc(c?c.nombre||'':'')+'</textarea></div>'+
    '<div class="btn-group">'+
      '<button class="btn btn-ok" id="_btn-ok">Guardar</button>'+
      '<button class="btn btn-outline" id="_btn-cancel">Cancelar</button>'+
    '</div>'
  );
  document.getElementById('_btn-ok').onclick = function(){ window.saveCE(key||null); };
  document.getElementById('_btn-cancel').onclick = function(){ closeModal('config-modal'); };
};

window.openEtqModal = function(key){
  const e = key ? DB.etiquetas[key] : null;
  const tipos = [...new Set(objArr(DB.etiquetas).map(function(x){ return String(x.tipo||'').trim(); }))].filter(Boolean);
  const nivArr = getNivelArr();
  const tiposOpts = tipos.map(function(t){ return '<option value="'+esc(t)+'">'; }).join('');
  const nivelOpts = nivArr.map(function(n){
    return '<option value="'+n.code+'" '+(e&&e.nivel_code===n.code?'selected':'')+'>'+esc(n.nombre)+'</option>';
  }).join('');
  openModal('config-modal',
    '<div class="modal-title">'+(e?'Editar Etiqueta':'+ Nueva Etiqueta')+'</div>'+
    '<div class="form-row">'+
      '<div class="form-group"><label>Tipo (ej: Accion, Estado)</label>'+
        '<input type="text" id="etq-tipo" value="'+esc(e?e.tipo||'':'')+'" list="etq-tipos-list" placeholder="Accion">'+
        '<datalist id="etq-tipos-list">'+tiposOpts+'</datalist></div>'+
      '<div class="form-group"><label>Nivel</label>'+
        '<select id="etq-code" '+(e?'disabled':'')+'>'+nivelOpts+'</select></div>'+
    '</div>'+
    '<div class="form-group mb2"><label>Etiqueta</label>'+
      '<input type="text" id="etq-texto" value="'+esc(e?e.etiqueta||'':'')+'" placeholder="Ej: Recuperar"></div>'+

      '<button class="btn btn-outline" id="_btn-cancel">Cancelar</button>'+
    '</div>'
  );

  document.getElementById('_btn-cancel').onclick = function(){ closeModal('config-modal'); };
};

window.saveEtq = async function(key){
  const tipo  = document.getElementById('etq-tipo').value.trim();
  const code  = document.getElementById('etq-code').value;
  const texto = document.getElementById('etq-texto').value.trim();
  if(!tipo||!code||!texto){ toast('Completa todos los campos','err'); return; }
  const data = {tipo:tipo, nivel_code:code, etiqueta:texto};
  if(key){ await dbSet('etiquetas/'+key, data); DB.etiquetas[key]=data; }
  else { const k=await dbPush('etiquetas', data); DB.etiquetas[k]=data; }
  closeModal('config-modal'); toast('Etiqueta guardada'); renderConfig();
};

window.delEtq = async function(key){
  const ok = await tgbConfirm({title:'Eliminar etiqueta', msg:'Eliminar esta etiqueta?', okLabel:'Eliminar', danger:true});
  if(!ok) return;
  await dbRemove('etiquetas/'+key); delete DB.etiquetas[key];
  toast('Etiqueta eliminada'); renderConfig();
};

window.delAllNotas = async function(){
  const ok = await tgbConfirm({title:'Borrar TODAS las notas', msg:'Esta accion no se puede deshacer.', okLabel:'Borrar todo', danger:true});
  if(!ok) return;
  await dbSet('notas', {});
  DB.notas = {};
  toast('Todas las notas eliminadas'); renderConfig();
};
